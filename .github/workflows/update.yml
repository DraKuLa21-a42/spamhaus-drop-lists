name: Update Spamhaus Lists

on:
  schedule:
    - cron: "0 */12 * * *"   # кожні 12 годин
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5

      - name: Install deps
        run: pip install requests

      - name: Run script
        run: python generate.py

      - name: Commit & push
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add output/*
          git commit -m "update lists" || exit 0
          git push
